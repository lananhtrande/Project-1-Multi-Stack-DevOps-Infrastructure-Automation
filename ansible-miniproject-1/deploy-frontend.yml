- name: Deploy vote and result app on frontend
  hosts: frontend
  become: yes

  vars:
    my_az: "{{ inventory_hostname.split('-')[1] }}"
    my_db_host: "{{ hostvars['postgres-' + my_az]['host_ip'] }}"
    my_redis_host: "{{ hostvars['backend-' + my_az]['host_ip'] }}"

  tasks:
    - name: Create app directory
      file:
        path: /home/ubuntu/app
        state: directory

    - name: Copy docker-compose
      template:
        src: templates/docker-compose-frontend.yml.j2
        dest: /home/ubuntu/app/docker-compose.yml

    - name: Run docker-compose
      command: docker-compose up -d
      args:
        chdir: /home/ubuntu/app