# ============================================================
# PLAY 2 — Configure the PRIMARY (master)
#   "Hey master, set yourself up to accept replication connections"
# ============================================================
- name: Configure PRIMARY
  hosts: pg_primary
  become: true

  vars:
    replica_ip: "{{ hostvars[groups['pg_replica'][0]]['host_ip'] }}"

  handlers:
    - name: restart postgresql
      systemd:
        name: postgresql
        state: restarted

    - name: reload postgresql
      systemd:
        name: postgresql
        state: reloaded

  tasks:
    # --- 1. Create a replication user so the slave can authenticate ---
    - name: Create replication user
      become_user: postgres
      postgresql_user:
        name: "{{ replication_user }}"
        password: "{{ replication_password }}"
        role_attr_flags: REPLICATION,LOGIN
        state: present

    # --- 2. Tell postgres to ship WAL logs and listen on the network ---
    - name: Configure postgresql.conf for replication
      blockinfile:
        path: "{{ pg_conf_dir }}/postgresql.conf"
        marker: "# {mark} ANSIBLE MANAGED — REPLICATION"
        block: |
          listen_addresses = '*'
          wal_level = replica
          max_wal_senders = 5
          wal_keep_size = '1GB'
      notify: restart postgresql

    # --- 3. Allow the replica's IP to connect for replication ---
    - name: Allow replica in pg_hba.conf
      lineinfile:
        path: "{{ pg_conf_dir }}/pg_hba.conf"
        line: "host all all 10.0.0.0/16 md5"
        state: present
      notify: reload postgresql

    # --- flush handlers so config is live before replica tries to connect ---
    - meta: flush_handlers
