# ============================================================
# PLAY 4 — Verify replication is working
# ============================================================
- name: Verify replication
  hosts: pg_primary
  become: true
  
  tasks:
    - name: Check replication status on primary
      become_user: postgres
      postgresql_query:
        query: "SELECT client_addr, state, sync_state FROM pg_stat_replication;"
      register: repl_status

    - name: Show replication status
      debug:
        var: repl_status.query_result