- name: Deploy redis and worker on backend
  hosts: backend
  become: yes

  vars:
    # backend-az1 → postgres-az1, backend-az2 → postgres-az2
    my_az: "{{ inventory_hostname.split('-')[1] }}"
    my_db_host: "{{ hostvars[groups['pg_primary'][0]]['host_ip'] }}"
    my_redis_host: "{{ hostvars['backend-' + my_az]['host_ip'] }}"

  tasks:
    - name: Create app directory
      file:
        path: /home/ubuntu/app
        state: directory

    - name: Copy docker-compose
      template:
        src: templates/docker-compose-backend.yml.j2
        dest: /home/ubuntu/app/docker-compose.yml

    - name: Run docker-compose
      command: docker-compose up -d
      args:
        chdir: /home/ubuntu/app

    - name: Show which DB this backend connects to
      debug:
        msg: "{{ inventory_hostname }} ({{ host_ip }}) → postgres-{{ my_az }} ({{ my_db_host }})"

    - name: Write DB connection config
      copy:
        dest: /home/ubuntu/app/db.conf
        content: |
          DB_HOST={{ my_db_host }}
          DB_PORT=5432
          DB_NAME=myapp-voting
